services:
  # Backend Node.js Service
  - type: web
    name: socratic-ai-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: socratic-ai-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend Next.js Service
  - type: web
    name: socratic-ai-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: socratic-ai-backend
          envVarKey: RENDER_EXTERNAL_URL
